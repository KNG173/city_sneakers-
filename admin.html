<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | CITY SNEAKERS KIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <header class="admin-header">
    <div class="logo">CITY <span>SNEAKERS</span> <small class="admin-badge">ADMIN</small></div>
    <div class="admin-actions">
      <input id="adminToken" class="admin-input" type="password" placeholder="ADMIN_TOKEN (X-Admin-Token)" />
      <button id="saveTokenBtn" class="admin-btn">Enregistrer</button>
      <button id="refreshBtn" class="admin-btn admin-btn-ghost">Rafraîchir</button>
      <a class="admin-link" href="index.html">← Retour boutique</a>
    </div>
  </header>

  <main class="admin-main">
    <section class="admin-card">
      <h2 class="admin-title">Produit</h2>
      <form id="productForm" class="admin-form">
        <div class="admin-row">
          <label class="admin-label">
            ID (ex: nike-25)
            <input id="p_id" class="admin-input" required />
          </label>
          <label class="admin-label">
            Catégorie (ex: nike)
            <input id="p_cat" class="admin-input" required />
          </label>
        </div>
        <label class="admin-label">
          Nom
          <input id="p_name" class="admin-input" required />
        </label>
        <div class="admin-row">
          <label class="admin-label">
            Image (ex: Nike2.jpg)
            <input id="p_img" class="admin-input" />
          </label>
          <label class="admin-label">
            Prix ($)
            <input id="p_price" class="admin-input" type="number" step="0.01" min="0" required />
          </label>
        </div>
        <label class="admin-checkbox">
          <input id="p_active" type="checkbox" checked />
          Actif (visible sur le site)
        </label>

        <div class="admin-row admin-row-actions">
          <button class="admin-btn" type="submit">Sauvegarder (Oracle)</button>
          <button id="resetBtn" class="admin-btn admin-btn-ghost" type="button">Nouveau</button>
        </div>
        <div id="status" class="admin-status" aria-live="polite"></div>
      </form>
    </section>

    <section class="admin-card">
      <div class="admin-title-row">
        <h2 class="admin-title">Produits</h2>
        <input id="filterInp" class="admin-input" placeholder="Filtrer (id, nom, cat)..." />
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Actif</th>
              <th>ID</th>
              <th>Nom</th>
              <th>Cat</th>
              <th>Prix</th>
              <th>Image</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="productsTbody"></tbody>
        </table>
      </div>
    </section>

    <section class="admin-card">
      <div class="admin-container">
        <h2>👟 Ajouter une nouvelle Sneaker</h2>
        <form id="formAjoutProduit">
          <input type="text" id="nom" placeholder="Nom de la chaussure (ex: Jordan 4 Retro)" required>
          <input type="number" id="prix" placeholder="Prix en $" required>
          <input type="text" id="image_url" placeholder="Nom du fichier image (ex: jordan4.jpg)" required>
          <button type="submit">Ajouter au stock Oracle</button>
        </form>
        <div id="messageConfirmation"></div>
      </div>
    </section>
  </main>
  <div id="adminToast" style="display:none; position: fixed; bottom: 20px; right: 20px; background:#1d1f3f; color:#fff; padding:12px 16px; border-radius: 8px; font-weight:600; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999;"></div>

  <script src="admin.js" defer></script>
</body>
</html>
