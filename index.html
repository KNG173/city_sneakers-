<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITY SNEAKERS KIN | Premium Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="preloader">
        <img src="logo x.png" class="loader-logo-img" alt="CITY SNEAKERS">
        <div class="loader-bar"></div>
    </div>

    <header>
        <div class="logo">CITY SNEAKERS</div>
        <div class="header-right">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Rechercher..." id="searchInput">
            </div>
            <div class="theme-toggle" onclick="toggleTheme()" title="Changer le thème">
                <i class="fas fa-moon" id="themeIcon"></i>
            </div>
            <div class="cart-icon" onclick="toggleCart(true)">
                <i class="fas fa-shopping-bag"></i>
                <div class="num-badge" id="cartCount">0</div>
            </div>
        </div>
    </header>

    <nav class="categories">
        <button class="cat-btn active" onclick="filterItems('all')">Tous</button>
        <button class="cat-btn" onclick="filterItems('jordan')">Jordan</button>
        <button class="cat-btn" onclick="filterItems('nike')">Nike</button>
        <button class="cat-btn" onclick="filterItems('adidas')">Adidas</button>
        <button class="cat-btn" onclick="filterItems('new-balance')">New Balance</button>
    </nav>

    <main class="product-grid" id="productGrid">
        </main>

    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-panel">
            <div class="cart-header">
                <h2>Mon Panier</h2>
                <i class="fas fa-times" onclick="toggleCart(false)"></i>
            </div>
            <div id="cartList" class="cart-items-list">
                </div>
            <div class="cart-footer">
                <div class="cart-total-line">
                    <span>Total :</span>
                    <span id="cartTotal">0.00</span>$
                </div>
                
                <div class="checkout-form">
                    <input type="text" id="nomClient" placeholder="Ton nom complet">
                    <input type="tel" id="phoneClient" placeholder="Numéro WhatsApp (ex: 084...)">
                    <select id="communeSelect">
                        <option value="0">Ville (Livraison gratuite)</option>
                        <option value="5">Gombe / Lingwala (+5$)</option>
                        <option value="7">Kintambo / Ngaliema (+7$)</option>
                        <option value="10">Autres communes (+10$)</option>
                    </select>
                </div>

                <button class="btn-order" onclick="finaliserCommande()">Commander via WhatsApp</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeModal()"></i>
            <div class="modal-body">
                <div class="modal-img-container">
                    <img id="modalImg" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle">Modèle</h2>
                    <p class="modal-price" id="modalPrice">0$</p>
                    <div class="size-section">
                        <label>Choisir la taille :</label>
                        <select id="sizeSelect">
                            <option>38</option>
                            <option>39</option>
                            <option>40</option>
                            <option>41</option>
                            <option>42</option>
                            <option>43</option>
                            <option>44</option>
                            <option>45</option>
                        </select>
                    </div>
                    <button class="btn-add" onclick="confirmAdd()">Ajouter au panier</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CITY SNEAKERS KIN | Kinshasa, RDC</p>
    </footer>

    <script src="main.js"></script>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            }, 2000); // L'animation dure 2 secondes
        });
    </script>
</body>
</html>
